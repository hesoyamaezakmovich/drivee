<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Drivee · Аналитика</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.25.6/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #111; color: #eee; min-height: 100vh; display: flex; flex-direction: column; font-size: 14px; line-height: 1.5; }

    .header { padding: 10px 20px; border-bottom: 1px solid #2a2a2a; background: #1a1a1a; display: flex; align-items: center; justify-content: space-between; }
    .logo { font-weight: 700; font-size: 17px; }
    .logo em { color: #b6f900; font-style: normal; }
    .nav-btn { font-size: 12.5px; color: #aaa; text-decoration: none; background: #1e1e1e; border: 1px solid #333; border-radius: 6px; padding: 5px 12px; }
    .nav-btn:hover { border-color: #b6f900; color: #eee; }

    .main { flex: 1; max-width: 820px; width: 100%; margin: 0 auto; padding: 20px 16px 130px; display: flex; flex-direction: column; gap: 12px; }

    .chips-section { display: flex; flex-wrap: wrap; gap: 6px; padding: 4px 0; }
    .chip { padding: 5px 12px; background: #1e1e1e; border: 1px solid #333; border-radius: 14px; cursor: pointer; font-size: 12.5px; color: #aaa; }
    .chip:hover { border-color: #b6f900; color: #eee; }
    .chips-loading { font-size: 12px; color: #555; padding: 4px 0; }

    .messages { display: flex; flex-direction: column; gap: 10px; }

    .msg-user { align-self: flex-end; max-width: 70%; background: #b6f900; color: #111; padding: 9px 14px; border-radius: 10px; font-weight: 500; }
    .msg-bot { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 8px; padding: 14px 16px; }
    .msg-welcome { background: #1a1a1a; border: 1px solid #2a2a2a; border-left: 3px solid #b6f900; border-radius: 8px; padding: 14px 16px; color: #aaa; }
    .msg-welcome strong { color: #eee; }
    .msg-welcome em { color: #b6f900; font-style: normal; }

    .explanation { background: #1e1e1e; border-left: 3px solid #b6f900; padding: 8px 12px; border-radius: 4px; margin-bottom: 10px; font-size: 13px; color: #aaa; }

    .meta-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; font-size: 11px; color: #666; }
    .meta-row span { background: #222; border: 1px solid #333; border-radius: 10px; padding: 2px 8px; }

    .kpi-card { background: #1e1e1e; border: 1px solid #2a2a2a; border-radius: 8px; padding: 24px; text-align: center; margin: 6px 0; }
    .kpi-label { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
    .kpi-value { font-size: 44px; font-weight: 700; color: #b6f900; }

    .table-wrap { overflow-x: auto; border: 1px solid #2a2a2a; border-radius: 6px; margin: 6px 0; }
    table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
    th { padding: 8px 12px; text-align: left; background: #1e1e1e; color: #666; font-size: 11px; text-transform: uppercase; border-bottom: 1px solid #2a2a2a; white-space: nowrap; }
    td { padding: 7px 12px; border-bottom: 1px solid #1e1e1e; color: #ccc; font-family: monospace; white-space: nowrap; }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: #1e1e1e; }
    .table-footer { text-align: center; padding: 6px; font-size: 11px; color: #555; background: #1a1a1a; border-top: 1px solid #2a2a2a; }

    .chart-wrap { height: 240px; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 6px; padding: 12px; margin: 6px 0; position: relative; }

    .error-msg { background: rgba(255,77,79,0.08); border: 1px solid rgba(255,77,79,0.3); border-radius: 6px; padding: 12px 14px; color: #ff6b6b; font-size: 13px; }

    .loader { display: flex; align-items: center; gap: 8px; padding: 14px 16px; border: 1px solid #2a2a2a; border-radius: 8px; color: #666; font-size: 13px; }
    .loader-dots { display: flex; gap: 3px; }
    .loader-dots span { width: 5px; height: 5px; border-radius: 50%; background: #b6f900; animation: bounce 1.2s infinite; }
    .loader-dots span:nth-child(2) { animation-delay: 0.15s; }
    .loader-dots span:nth-child(3) { animation-delay: 0.3s; }
    @keyframes bounce { 0%,80%,100% { opacity: 0.3; } 40% { opacity: 1; } }

    details summary { cursor: pointer; font-size: 11.5px; color: #555; padding: 5px 0; user-select: none; }
    details summary:hover { color: #888; }
    .sql-code { background: #0d0d0d; border: 1px solid #2a2a2a; color: #7dd3a8; padding: 10px 12px; border-radius: 6px; font-family: monospace; font-size: 11.5px; overflow-x: auto; white-space: pre; margin-top: 6px; line-height: 1.6; }

    /* Input dock */
    .input-dock { position: fixed; bottom: 0; left: 0; right: 0; background: #111; padding: 12px 16px 20px; border-top: 1px solid #2a2a2a; }
    .input-inner { max-width: 820px; margin: 0 auto; position: relative; }

    /* Ghost wrapper — gives the input its background so textarea can be transparent */
    .input-wrap {
      position: relative;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      transition: border-color 0.15s;
    }
    .input-wrap:focus-within { border-color: #b6f900; }

    /* Ghost layer — sits behind textarea, same font/padding */
    .ghost-layer {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      padding: 12px 90px 12px 12px;
      font-size: 14px;
      font-family: sans-serif;
      line-height: 1.5;
      color: transparent;          /* typed text: invisible */
      pointer-events: none;
      white-space: pre-wrap;
      word-break: break-word;
      overflow: hidden;
    }
    .ghost-suffix { color: #555; } /* ghost continuation: visible gray */

    textarea.input-box {
      display: block;
      width: 100%;
      padding: 12px 90px 12px 12px;
      border: none;                /* border is on .input-wrap */
      border-radius: 8px;
      background: transparent;     /* KEY: shows ghost layer behind */
      color: #eee;
      font-size: 14px;
      font-family: sans-serif;
      resize: none;
      height: 48px;
      outline: none;
      line-height: 1.5;
      position: relative;
      z-index: 1;
    }
    textarea.input-box::placeholder { color: #444; }

    .input-controls { display: flex; align-items: center; gap: 8px; margin-top: 6px; justify-content: flex-end; }
    .send-btn { height: 34px; padding: 0 16px; background: #b6f900; color: #111; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; }
    .send-btn:hover { background: #caff20; }
    .send-btn:disabled { background: #222; color: #555; cursor: not-allowed; }
    .tab-hint { font-size: 11px; color: #555; }

    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 3px; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useRef, useEffect } = React;
const API = "http://localhost:8000";

function fmt(v) {
  if (v === null || v === undefined || v === "") return "—";
  const n = Number(v);
  if (!isNaN(n) && v !== "") {
    if (Number.isInteger(n)) return n.toLocaleString("ru-RU");
    return n.toLocaleString("ru-RU", { maximumFractionDigits: 2 });
  }
  return String(v);
}

function SqlCode({ sql }) {
  if (!sql) return null;
  const hl = sql
    .replace(/\b(SELECT|FROM|WHERE|GROUP BY|ORDER BY|LIMIT|COUNT|SUM|AVG|DISTINCT|CASE|WHEN|THEN|ELSE|END|AND|OR|NOT|IN|AS|BY|ON|LEFT|JOIN|INNER|HAVING|DATE|WITH|DESC|ASC|NULL|IS|FILTER)\b/gi,
      m => `<span style="color:#60a5fa">${m}</span>`)
    .replace(/'([^']*)'/g, m => `<span style="color:#fbbf24">${m}</span>`);
  return <div className="sql-code" dangerouslySetInnerHTML={{ __html: hl }} />;
}

function DataChart({ chartType, columns, rows }) {
  const canvasRef = useRef(null);
  const chartRef = useRef(null);
  const type = chartType === "pie" ? "pie" : chartType === "line" ? "line" : "bar";
  const labels = rows.map(r => String(r[0]).length > 18 ? String(r[0]).slice(0, 16) + "…" : String(r[0]));
  const values = rows.map(r => Number(r[1]) || 0);
  const PIE_COLORS = ["#b6f900","#60a5fa","#fbbf24","#f87171","#a78bfa","#34d399","#fb923c","#38bdf8"];

  useEffect(() => {
    if (!canvasRef.current) return;
    if (chartRef.current) chartRef.current.destroy();
    chartRef.current = new Chart(canvasRef.current, {
      type,
      data: {
        labels,
        datasets: [{
          label: columns[1] || "Значение",
          data: values,
          backgroundColor: type === "pie" ? PIE_COLORS : "rgba(182,249,0,0.7)",
          borderColor: type === "line" ? "#b6f900" : "transparent",
          borderWidth: type === "line" ? 2 : 0,
          fill: type === "line" ? { target: "origin", above: "rgba(182,249,0,0.06)" } : false,
          tension: 0.35,
          pointBackgroundColor: "#b6f900",
          pointRadius: type === "line" ? 3 : 0,
          borderRadius: type === "bar" ? 4 : 0,
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { display: type === "pie", labels: { color: "#888", font: { size: 11 } } },
          tooltip: {
            backgroundColor: "#1e1e1e", titleColor: "#eee", bodyColor: "#888",
            borderColor: "#333", borderWidth: 1, padding: 8,
            callbacks: { label: ctx => ` ${fmt(ctx.raw)}` }
          }
        },
        scales: type === "pie" ? {} : {
          x: { ticks: { color: "#555", font: { size: 11 }, maxRotation: 30 }, grid: { color: "#1e1e1e" } },
          y: { ticks: { color: "#555", font: { size: 11 } }, grid: { color: "#1e1e1e" } }
        }
      }
    });
    return () => { if (chartRef.current) chartRef.current.destroy(); };
  }, [chartType, JSON.stringify(rows)]);

  return <div className="chart-wrap"><canvas ref={canvasRef} /></div>;
}

function ResultView({ chartType, columns, rows }) {
  if (columns.length === 1 && rows.length === 1) {
    const n = Number(rows[0][0]);
    return (
      <div className="kpi-card">
        <div className="kpi-label">{columns[0].replace(/_/g, " ")}</div>
        <div className="kpi-value">{!isNaN(n) ? n.toLocaleString("ru-RU", { maximumFractionDigits: 2 }) : String(rows[0][0])}</div>
      </div>
    );
  }
  const showChart = chartType !== "table" && rows.length > 0 && rows.length <= 60
    && columns.length >= 2 && !isNaN(Number(rows[0][1]));
  const MAX_TABLE = 20;

  return (
    <>
      {showChart && <DataChart chartType={chartType} columns={columns} rows={rows} />}
      <div className="table-wrap">
        <table>
          <thead><tr>{columns.map((c, i) => <th key={i}>{c.replace(/_/g, " ")}</th>)}</tr></thead>
          <tbody>
            {rows.slice(0, MAX_TABLE).map((row, i) =>
              <tr key={i}>{row.map((v, j) => <td key={j}>{fmt(v)}</td>)}</tr>
            )}
          </tbody>
        </table>
        {rows.length > MAX_TABLE && (
          <div className="table-footer">Показано {MAX_TABLE} из {rows.length.toLocaleString("ru-RU")} строк</div>
        )}
      </div>
    </>
  );
}

function BotMessage({ data }) {
  if (data.error) {
    return (
      <div className="msg-bot">
        <div className="error-msg">
          <strong>{data.error === "guardrails" ? "Guardrail" : "Ошибка"}</strong>
          <div style={{ marginTop: 5 }}>{data.message}</div>
        </div>
      </div>
    );
  }
  const conf = data.confidence ?? 0.9;
  const CHART_LABELS = { bar: "Столбчатый", line: "Линейный", pie: "Круговой", table: "Таблица" };
  return (
    <div className="msg-bot">
      {data.explanation && <div className="explanation">{data.explanation}</div>}
      <div className="meta-row">
        {data.chart_type && <span>{CHART_LABELS[data.chart_type] || data.chart_type}</span>}
        {data.data?.rows && <span>{data.data.rows.length} строк</span>}
        <span>conf {Math.round(conf * 100)}%</span>
        {data.timings?.total_ms && <span>{data.timings.total_ms} мс</span>}
      </div>
      {data.data && <ResultView chartType={data.chart_type} columns={data.data.columns} rows={data.data.rows} />}
      <details>
        <summary>▸ SQL</summary>
        <SqlCode sql={data.sql} />
      </details>
    </div>
  );
}

function App() {
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState("");
  const [ghost, setGhost] = useState("");
  const [loading, setLoading] = useState(false);
  const [chips, setChips] = useState([]);
  const [chipsLoading, setChipsLoading] = useState(false);
  const bottomRef = useRef(null);
  const ghostTimerRef = useRef(null);
  const chipsTimerRef = useRef(null);
  const historyRef = useRef([]);

  useEffect(() => { bottomRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages, loading]);

  // Load initial chips
  useEffect(() => { loadChips("", []); }, []);

  // Ghost text — debounced, fires after 400ms idle
  useEffect(() => {
    clearTimeout(ghostTimerRef.current);
    if (input.length < 2) { setGhost(""); return; }
    ghostTimerRef.current = setTimeout(async () => {
      try {
        const res = await fetch(`${API}/suggest/ghost`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ prefix: input })
        });
        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let txt = "";
        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          for (const line of decoder.decode(value).split("\n")) {
            const m = line.match(/"text":\s*"((?:[^"\\]|\\.)*)"/);
            if (m) txt += JSON.parse(`"${m[1]}"`);
          }
          setGhost(txt);
        }
      } catch {}
    }, 400);
  }, [input]);

  // Chips — debounced on input change
  useEffect(() => {
    clearTimeout(chipsTimerRef.current);
    if (messages.length > 0) return; // only show chips on empty screen
    chipsTimerRef.current = setTimeout(() => {
      loadChips(input, historyRef.current);
    }, 600);
  }, [input, messages.length]);

  async function loadChips(inputText, history) {
    setChipsLoading(true);
    try {
      const r = await fetch(`${API}/suggest/chips`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ input: inputText, history })
      });
      const d = await r.json();
      setChips(d.suggestions || []);
    } catch {}
    setChipsLoading(false);
  }

  const ask = async (q) => {
    const question = (q || input).trim();
    if (!question || loading) return;
    setMessages(m => [...m, { type: "user", content: question }]);
    setInput(""); setGhost(""); setLoading(true);
    historyRef.current = [...historyRef.current, question].slice(-6);
    try {
      const r = await fetch(`${API}/query`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ question })
      });
      const data = await r.json();
      setMessages(m => [...m, { type: "bot", data }]);
    } catch (e) {
      setMessages(m => [...m, { type: "bot", data: { error: "error", message: e.message } }]);
    }
    setLoading(false);
  };

  const handleKeyDown = (e) => {
    if (e.key === "Tab" && ghost) {
      e.preventDefault();
      // Directly concatenate — no separator; ghost already has space if needed
      setInput(input + ghost);
      setGhost("");
    } else if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      ask();
    }
  };

  return (
    <>
      <header className="header">
        <div className="logo">Driv<em>ee</em> <span style={{fontWeight:400,fontSize:13,color:"#555"}}>Analytics</span></div>
        <a href="reports.html" className="nav-btn">📋 Отчёты</a>
      </header>

      <div className="main">
        {messages.length === 0 && (
          <>
            <div className="msg-welcome">
              <strong>Привет!</strong> Задай вопрос об аналитике на русском — переведу в SQL и покажу график.<br/>
              Например: <em>«Топ 10 водителей по поездкам за неделю»</em> или <em>«Доля отмен по городам»</em>
            </div>
            <div className="chips-section">
              {chipsLoading && chips.length === 0
                ? <span className="chips-loading">Загружаю подсказки…</span>
                : chips.map((c, i) => (
                    <div key={i} className="chip" onClick={() => ask(c)}>{c}</div>
                  ))
              }
            </div>
          </>
        )}

        <div className="messages">
          {messages.map((m, i) =>
            m.type === "user"
              ? <div key={i} className="msg-user">{m.content}</div>
              : <BotMessage key={i} data={m.data} />
          )}
          {loading && (
            <div className="loader">
              <div className="loader-dots"><span/><span/><span/></div>
              Генерирую SQL…
            </div>
          )}
        </div>
        <div ref={bottomRef} />
      </div>

      <div className="input-dock">
        <div className="input-inner">
          <div className="input-wrap">
            {/* Ghost layer: invisible typed text + visible gray continuation */}
            <div className="ghost-layer" aria-hidden="true">
              {input}<span className="ghost-suffix">{ghost}</span>
            </div>
            <textarea
              className="input-box"
              value={input}
              placeholder="Сколько отмен было за последнюю неделю?"
              onChange={e => setInput(e.target.value)}
              onKeyDown={handleKeyDown}
            />
          </div>
          <div className="input-controls">
            {ghost && <span className="tab-hint">Tab → принять</span>}
            <button className="send-btn" disabled={loading || !input.trim()} onClick={() => ask()}>
              Спросить
            </button>
          </div>
        </div>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
