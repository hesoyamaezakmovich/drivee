<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Drivee · Аналитика без SQL</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.25.6/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f6f7f9; color: #1a1a1a; }
    .app { max-width: 900px; margin: 40px auto; padding: 24px; background: white; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
    .header { font-size: 24px; font-weight: bold; margin-bottom: 24px; color: #111827; }
    .header span { color: #A3E635; }
    
    .chat { display: flex; flex-direction: column; gap: 16px; margin-bottom: 24px; }
    .msg { padding: 16px; border-radius: 12px; line-height: 1.5; font-size: 15px; }
    .msg.user { background: #f3f4f6; align-self: flex-end; color: #111827; font-weight: 500; }
    .msg.bot { background: #fff; border: 1px solid #e5e7eb; width: 100%; }

    .input-wrap { position: relative; }
    .input-box { width: 100%; height: 60px; padding: 18px 110px 18px 18px; border-radius: 12px; border: 2px solid #e5e7eb; font-size: 16px; font-family: inherit; resize: none; outline: none; position: relative; z-index: 2; background: transparent; }
    .input-box:focus { border-color: #A3E635; }
    
    .ghost { position: absolute; top: 0; left: 0; padding: 18px; font-size: 16px; color: #9ca3af; z-index: 1; pointer-events: none; }
    .ghost span { color: transparent; }

    .btn { position: absolute; right: 8px; top: 8px; height: 44px; padding: 0 20px; border-radius: 8px; border: none; background: #A3E635; color: #111; font-weight: 600; cursor: pointer; z-index: 3; }
    .btn:disabled { background: #d1d5db; cursor: not-allowed; }

    .explanation { background: #f9fafb; padding: 12px; border-radius: 8px; color: #4b5563; margin-bottom: 16px; border-left: 4px solid #A3E635; }
    .sql-code { background: #1f2937; color: #e5e7eb; padding: 12px; border-radius: 8px; font-family: monospace; font-size: 13px; margin: 12px 0; overflow-x: auto; }
    
    .kpi-card { background: #f0fdf4; border: 1px solid #bbf7d0; padding: 24px; border-radius: 12px; text-align: center; margin: 16px 0; }
    .kpi-title { font-size: 14px; color: #166534; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
    .kpi-value { font-size: 40px; font-weight: bold; color: #15803d; margin-top: 8px; }

    table { width: 100%; border-collapse: collapse; font-size: 14px; margin-top: 16px; }
    th { background: #f3f4f6; padding: 10px; text-align: left; }
    td { padding: 10px; border-bottom: 1px solid #e5e7eb; }
    
    .chips { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
    .chip { padding: 6px 12px; background: #f3f4f6; border-radius: 20px; font-size: 13px; cursor: pointer; border: 1px solid #e5e7eb; }
    .chip:hover { background: #e5e7eb; border-color: #d1d5db; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useRef, useEffect } = React;
const API = "http://localhost:8000";

function ChartOrKPI({ chartType, columns, rows }) {
  const canvasRef = useRef(null);

  // === НОВАЯ ЛОГИКА ИЗ ВТОРОГО РЕШЕНИЯ: KPI-карточка ===
  if (columns.length === 1 && rows.length === 1) {
    const val = rows[0][0];
    const formatted = typeof val === 'number' ? new Intl.NumberFormat('ru-RU').format(Math.round(val)) : val;
    return (
      <div className="kpi-card">
        <div className="kpi-title">{columns[0].replace(/_/g, ' ')}</div>
        <div className="kpi-value">{formatted}</div>
      </div>
    );
  }

  // Таблица, если данных много или явно просят
  if (chartType === "table" || rows.length === 0 || rows.length > 50) {
    return (
      <table>
        <thead><tr>{columns.map(c => <th key={c}>{c}</th>)}</tr></thead>
        <tbody>
          {rows.slice(0, 15).map((r, i) => (
            <tr key={i}>{r.map((v, j) => <td key={j}>{v}</td>)}</tr>
          ))}
        </tbody>
      </table>
    );
  }

  // Отрисовка графиков
  useEffect(() => {
    if (!canvasRef.current) return;
    const chart = new Chart(canvasRef.current, {
      type: chartType === "pie" ? "pie" : "bar",
      data: {
        labels: rows.map(r => r[0]),
        datasets:[{
          label: columns[1] || 'Значение',
          data: rows.map(r => Number(r[1]) || 0),
          backgroundColor: '#A3E635'
        }]
      }
    });
    return () => chart.destroy();
  }, [chartType, columns, rows]);

  return <div style={{height: 300, marginTop: 16}}><canvas ref={canvasRef}/></div>;
}

function App() {
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState("");
  const [ghost, setGhost] = useState("");
  const [loading, setLoading] = useState(false);

  const fetchGhost = async (text) => {
    if (text.length < 3) return setGhost("");
    try {
      const res = await fetch(`${API}/suggest/ghost`, {
        method: "POST", headers: {"Content-Type": "application/json"},
        body: JSON.stringify({prefix: text})
      });
      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let streamTxt = "";
      while (true) {
        const {value, done} = await reader.read();
        if (done) break;
        const chunk = decoder.decode(value);
        const match = chunk.match(/"text":\s*"([^"]+)"/);
        if (match) {
          streamTxt += match[1];
          setGhost(streamTxt);
        }
      }
    } catch {}
  };

  useEffect(() => {
    const t = setTimeout(() => fetchGhost(input), 400);
    return () => clearTimeout(t);
  }, [input]);

  const ask = async (q) => {
    if (!q) return;
    setMessages(m =>[...m, {role: "user", content: q}]);
    setInput(""); setGhost(""); setLoading(true);
    try {
      const r = await fetch(`${API}/query`, {
        method: "POST", headers: {"Content-Type": "application/json"},
        body: JSON.stringify({question: q})
      });
      const data = await r.json();
      setMessages(m => [...m, {role: "bot", data}]);
    } catch (e) {
      setMessages(m =>[...m, {role: "bot", data: {error: "error", message: e.message}}]);
    }
    setLoading(false);
  };

  return (
    <div className="app">
      <div className="header">Driv<span>ee</span> Analytics</div>
      
      <div className="chat">
        {messages.length === 0 && <div className="msg bot">Привет! Спроси меня о данных. Например: выручка по городам за последние 7 дней.</div>}
        {messages.map((m, i) => (
          <div key={i} className={`msg ${m.role}`}>
            {m.role === 'user' ? m.content : (
              m.data.error ? <span style={{color:'red'}}>Ошибка: {m.data.message} <br/><br/> {m.data.sql}</span> :
              <div>
                <div className="explanation"><b>Понял так:</b> {m.data.explanation}</div>
                <ChartOrKPI chartType={m.data.chart_type} columns={m.data.data.columns} rows={m.data.data.rows} />
                <details><summary style={{cursor:'pointer', marginTop:10, color:'#6b7280'}}>Показать SQL</summary>
                  <div className="sql-code">{m.data.sql}</div>
                </details>
              </div>
            )}
          </div>
        ))}
        {loading && <div className="msg bot">Анализирую миллион строк... ⏳</div>}
      </div>

      <div className="input-wrap">
        <div className="ghost"><span>{input}</span>{ghost && (input.endsWith(' ') ? ghost : ' ' + ghost)}</div>
        <textarea className="input-box" rows="1" value={input} 
          onChange={e => setInput(e.target.value)}
          onKeyDown={e => {
            if (e.key === 'Tab' && ghost) { e.preventDefault(); setInput(input + (input.endsWith(' ') ? '' : ' ') + ghost); setGhost(""); }
            if (e.key === 'Enter') { e.preventDefault(); ask(input); }
          }} 
          placeholder="Сколько отмен было вчера?" />
        <button className="btn" disabled={loading} onClick={() => ask(input)}>Отправить</button>
      </div>

      <div className="chips">
        <div className="chip" onClick={()=>ask("Покажи уникальные заказы за все время")}>Уникальные заказы</div>
        <div className="chip" onClick={()=>ask("Выручка по городам (city_id)")}>Выручка по городам</div>
        <div className="chip" onClick={()=>ask("Доля отмен по городам")}>Доля отмен по городам</div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
